      hidden: 3072
      activation: gelu
      dropout: 0.0
  - attn:
      kind: MHA
      heads: 12
      head_dim: 64
      rope: standard
      kv_groups: 1
      dropout: 0.0
    ffn:
      type: dense
      hidden: 3072
      activation: gelu
      dropout: 0.0
  head:
    tie_embeddings: true
    vocab: 50257
  norm: layernorm
train:
  lr: 0.0006
  warmup: 20
  clip: 1.0
  bf16: false
  grad_ckpt: true
  max_tokens: 180000
  weight_decay: 0.1
  seed: 4242
  passkey_eval_steps: 0
  speedrun_eval_interval: 4
  speedrun_eval_batches: 4
  speedrun_target_ppl: 2500.0
  ppl_stop_threshold: null
  entropy_threshold: 0.5
  entropy_patience: 3
  instability_threshold: 500.0
  no_improve_patience: 60
  improvement_tolerance: 0.001
  optimizer:
    name: adamw
    gradient_transform:
      mode: identity
      ns_steps: 5
      eps: 1.0e-08
    update_filter:
      mode: none
      keep_ratio: 1.0
      granularity: element
      block_size: 128
      momentum_blend: 0.0
      rescale_kept: true
data:
  tokenizer: gpt2
  hf_revision: main
  streaming: false
  packed: true
  packed_train_path: runs/packed/openwebtext/train.bin
  packed_val_path: runs/packed/openwebtext/val.bin
  packed_dtype: uint16
  seq_len: 1024
  batch_size: 2
  workers: 0
  shards: []
  eval_tokens: 65536
  healing_shards: []
  healing_tokens: null
evolution:
  rung0_thresholds:
    max_params: 150000000
    max_kv_bytes_per_token: 45000
    min_throughput_proxy: 1.0
    min_layers: 12
  rung1_tokens: 60000
  rung2_tokens: 180000
  population: 10
  topk_keep: 0.4
  crossover_prob: 0.0
  parent_selection: map_elites
  archive_max_elites: 24
  structural_elite_k: 3
  weight_inheritance: scratch
  register_template_entries: false
  template_learning: false
  context_aware_mutation: true
  adaptive_mutation: true
  mutation_allowlist:
  - mix_method_recipe
  - mix_optimizer_recipe
  - resample_optimizer_base
  - tune_optimizer
  - toggle_gradient_transform_mode
  - tune_gradient_transform_ns_steps
  - tune_gradient_transform_eps
  - toggle_update_filter_mode
  - tune_update_filter_ratio
  - tune_update_filter_granularity
  - tune_update_filter_momentum_blend
  - tune_update_filter_block_size
  - toggle_linear_attention
  - toggle_mla_attention
  - tune_softmax_policy
  - toggle_value_glu
  - toggle_qk_norm
  - dense_to_moe
  - mutate_topk
  - tune_router
  - shift_moe
  - make_gqa
  - insert_assoc_memory
  - tune_assoc_memory
  - insert_memory_tokens
  - tune_memory_tokens
  - insert_chunk_memory
  - tune_chunk_memory
  - insert_lookup_memory
  - tune_lookup_memory
  - toggle_branch_router
  - tune_branch_router
  - insert_layer_scale
  - tune_layer_scale
  - add_recurrence
  - tune_recurrence
  - toggle_hyper_connections
  - tune_hyper_connections
  - graph_jitter
  mutation_weights:
    mix_method_recipe: 5.0
    mix_optimizer_recipe: 2.0
    resample_optimizer_base: 1.0
    tune_optimizer: 2.0
    toggle_gradient_transform_mode: 2.0
    tune_gradient_transform_ns_steps: 1.0
    tune_gradient_transform_eps: 1.0
    toggle_update_filter_mode: 1.5
    tune_update_filter_ratio: 2.0
    tune_update_filter_granularity: 1.2
    tune_update_filter_momentum_blend: 1.5
    tune_update_filter_block_size: 1.0
    toggle_linear_attention: 1.5
    toggle_mla_attention: 1.5
    tune_softmax_policy: 1.5
    toggle_value_glu: 1.2
    toggle_qk_norm: 1.2
    dense_to_moe: 1.5
    mutate_topk: 1.5
    tune_router: 1.5
    shift_moe: 1.0
    make_gqa: 1.0
    insert_assoc_memory: 1.2
    tune_assoc_memory: 1.2
    insert_memory_tokens: 1.2
    tune_memory_tokens: 1.2
    insert_chunk_memory: 1.2
    tune_chunk_memory: 1.2
    insert_lookup_memory: 1.2
    tune_lookup_memory: 1.2
    toggle_branch_router: 1.2
    tune_branch_router: 1.2
    insert_layer_scale: 1.0
    tune_layer_scale: 1.0
    add_recurrence: 1.0
    tune_recurrence: 1.0
    toggle_hyper_connections: 1.0
    tune_hyper_connections: 1.0
    graph_jitter: 1.5
  objectives:
    speedrun_flops_to_target: min
    ppl_code: min
    novelty: max
    throughput: max
    instability: min
    graph_entropy: max
  adaptive_mutation_eta: 0.15
