model:
  name: exp-nanogpt-speedrun-owt-10m-v10-anytime
  emb:
    dim: 768
    vocab: 50257
    dropout: 0.0
  blocks:
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
    - attn: { kind: MHA, heads: 12, head_dim: 64, rope: standard, kv_groups: 1, dropout: 0.0 }
      ffn: { type: dense, hidden: 3072, activation: gelu, dropout: 0.0 }
  head:
    tie_embeddings: true
    vocab: 50257
  norm: layernorm
train:
  lr: 6.0e-4
  warmup: 20
  clip: 1.0
  bf16: false
  grad_ckpt: true
  max_tokens: 900000
  weight_decay: 0.1
  seed: 0
  passkey_eval_steps: 0
  # "Anytime" speedrun probes: no fixed target; just measure the learning curve.
  # Keep total eval compute roughly constant: fewer probes, more batches per probe.
  speedrun_eval_interval: 16
  speedrun_eval_batches: 16
  ppl_stop_threshold: null
  entropy_threshold: 0.5
  entropy_patience: 3
  instability_threshold: 500.0
  # Disable "no_improve" early-stop so candidates always use the full token budget.
  no_improve_patience: 100000
  improvement_tolerance: 0.0
data:
  tokenizer: gpt2
  hf_revision: main
  streaming: false
  packed: true
  packed_train_path: runs/packed/openwebtext_10m/train.bin
  packed_val_path: runs/packed/openwebtext_10m/val.bin
  packed_dtype: uint16
  seq_len: 1024
  batch_size: 2
  workers: 0
  shards: []
  eval_tokens: 65536
  healing_shards: []
  healing_tokens: null
evolution:
  rung0_thresholds:
    max_params: 150000000
    max_kv_bytes_per_token: 45000
    min_throughput_proxy: 1.0
    min_layers: 12
    # Prevent Pareto-admitting models that are meaningfully worse than baseline
    # (e.g. very high loss but high throughput).
    max_speedrun_loss_auc: 8.0
    max_speedrun_end_eval_loss: 8.0
  # Fair benchmark budget: do not scale tokens by depth/MoE heuristics.
  fixed_token_budget: true
  rung1_tokens: 900000
  rung2_tokens: 900000
  population: 24
  topk_keep: 0.45
  crossover_prob: 0.4
  parent_selection: map_elites
  archive_max_elites: 64
  structural_elite_k: 4
  adaptive_mutation: true
  adaptive_mutation_eta: 0.1
  adaptive_mutation_min_weight: 0.05
  adaptive_mutation_max_weight: 5.0
  weight_inheritance: scratch
  composite_metrics:
    # Couple quality and speed to avoid Pareto-admitting "fast-but-bad" candidates.
    - name: efficiency_score
      op: ratio
      numerator: speedrun_loss_auc
      denominator: throughput
      epsilon: 1.0e-6
  # Optimize the full learning curve (AUC) and the end-of-budget loss.
  objectives:
    speedrun_loss_auc: min
    speedrun_end_eval_loss: min
    efficiency_score: min
