      type: dense
      hidden: 3072
      activation: gelu
      dropout: 0.0
  head:
    tie_embeddings: true
    vocab: 50257
  norm: layernorm
train:
  lr: 0.0006
  warmup: 20
  clip: 1.0
  bf16: false
  grad_ckpt: true
  max_tokens: 180000
  weight_decay: 0.1
  seed: 4242
  passkey_eval_steps: 0
  speedrun_eval_interval: 4
  speedrun_eval_batches: 4
  speedrun_target_ppl: 2500.0
  ppl_stop_threshold: null
  entropy_threshold: 0.5
  entropy_patience: 3
  instability_threshold: 500.0
  no_improve_patience: 60
  improvement_tolerance: 0.001
  optimizer:
    name: adamw
    gradient_transform:
      mode: identity
      ns_steps: 5
      eps: 1.0e-08
    update_filter:
      mode: none
      keep_ratio: 1.0
      granularity: element
      block_size: 128
      momentum_blend: 0.0
      rescale_kept: true
data:
  tokenizer: gpt2
  hf_revision: main
  streaming: false
  packed: true
  packed_train_path: runs/packed/openwebtext/train.bin
  packed_val_path: runs/packed/openwebtext/val.bin
  packed_dtype: uint16
  seq_len: 1024
  batch_size: 2
  workers: 0
  shards: []
  eval_tokens: 65536
  healing_shards: []
  healing_tokens: null
evolution:
  rung0_thresholds:
    max_params: 150000000
    max_kv_bytes_per_token: 45000
    min_throughput_proxy: 1.0
    min_layers: 12
  rung1_tokens: 60000
  rung2_tokens: 180000
  population: 6
  topk_keep: 0.45
  crossover_prob: 0.0
  parent_selection: map_elites
  archive_max_elites: 16
  structural_elite_k: 2
  weight_inheritance: scratch
  register_template_entries: false
  template_learning: false
  context_aware_mutation: false
  adaptive_mutation: false
  mutation_allowlist:
  - resample_optimizer_base
  - tune_optimizer
  - toggle_gradient_transform_mode
  - tune_gradient_transform_ns_steps
  - tune_gradient_transform_eps
  - toggle_update_filter_mode
  - tune_update_filter_ratio
  - tune_update_filter_granularity
  - tune_update_filter_momentum_blend
  - tune_update_filter_block_size
  - mix_optimizer_recipe
  mutation_weights:
    resample_optimizer_base: 1.5
    tune_optimizer: 3.0
    toggle_gradient_transform_mode: 2.5
    tune_gradient_transform_ns_steps: 1.5
    tune_gradient_transform_eps: 1.5
    toggle_update_filter_mode: 2.0
    tune_update_filter_ratio: 3.0
    tune_update_filter_granularity: 1.5
    tune_update_filter_momentum_blend: 2.0
    tune_update_filter_block_size: 1.0
    mix_optimizer_recipe: 2.0
  objectives:
    speedrun_flops_to_target: min
    ppl_code: min
    speedrun_best_eval_loss: min
