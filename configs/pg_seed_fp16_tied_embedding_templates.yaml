templates:
  - name: seed-fp16-anchor
    weight: 1.6
    conditions:
      parameter_golf_only: true
    actions:
      - tune_optimizer:
          optimizer_name: muon
          lr: 0.04
          matrix_lr: 0.06
          scalar_lr: 0.04
          tied_embedding_lr: 0.05
          tied_embedding_export_dtype: fp16
          tied_embed_init_std: 0.005
          warmup: 20
          warmdown_steps: 3600
          clip: 0.0
          muon_momentum_warmup_start: 0.85
          muon_momentum_warmup_steps: 500
  - name: seed-fp16-lower-init
    weight: 1.0
    conditions:
      parameter_golf_only: true
    actions:
      - tune_optimizer:
          optimizer_name: muon
          lr: 0.04
          matrix_lr: 0.06
          scalar_lr: 0.04
          tied_embedding_lr: 0.05
          tied_embedding_export_dtype: fp16
          tied_embed_init_std: 0.004
          warmup: 20
          warmdown_steps: 3600
          clip: 0.0
