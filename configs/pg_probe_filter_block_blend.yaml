model:
  name: pg-probe-filter-block-blend
  emb:
    dim: 512
    vocab: 1024
  blocks:
    - &lane1_block
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 4
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 1024
        activation: swiglu
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
  head:
    vocab: 1024
    tie_embeddings: true

train:
  lr: 0.001
  warmup: 48
  clip: 1.0
  bf16: true
  grad_ckpt: false
  max_tokens: 524288
  seed: 0
  optimizer:
    name: muon
    gradient_transform:
      mode: orthogonalize_2d
      ns_steps: 5
      eps: 1.0e-8
    update_filter:
      mode: bernoulli
      keep_ratio: 0.65
      granularity: block
      block_size: 128
      momentum_blend: 0.25

data:
  tokenizer: parameter-golf
  seq_len: 512
  batch_size: 8
  workers: 0
  eval_tokens: 8192
  shards:
    - name: parameter-golf
      split: train
      weight: 1.0

parameter_golf:
  train_shards_glob: runs/parameter_golf/fineweb10b_sp1024/train_*.bin
  val_shards_glob: runs/parameter_golf/fineweb10b_sp1024/val_*.bin
  tokenizer_path: runs/parameter_golf/tokenizers/sp1024.model
  artifact_budget_bytes: 16000000
  code_bytes: 50000
  track: 10min

evolution:
  population: 16
  rung1_tokens: 262144
  rung2_tokens: 524288
  crossover_prob: 0.0
  parent_selection: map_elites
  weight_inheritance: scratch
  objectives:
    val_bpb: min
    artifact_total_bytes: min
    quantization_delta_bpb: min
    throughput: max
  rung0_thresholds:
    max_params: 28000000
    max_artifact_total_bytes_est: 24000000
    max_artifact_total_bytes: 16000000
