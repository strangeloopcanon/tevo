model:
  name: pg-track-10min-official-env-baseline
  emb:
    dim: 512
    vocab: 1024
    init_std: 0.005
  blocks:
    - &official_block
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 2
        rope: standard
        rope_theta: 10000.0
        softmax:
          qk_norm: rms
          softcap: 30.0
      ffn:
        type: dense
        hidden: 1024
        activation: relu_squared
    - *official_block
    - *official_block
    - *official_block
    - *official_block
    - *official_block
    - *official_block
    - *official_block
    - *official_block
  head:
    vocab: 1024
    tie_embeddings: true

train:
  lr: 0.04
  matrix_lr: 0.04
  scalar_lr: 0.04
  tied_embedding_lr: 0.05
  weight_decay: 0.0
  warmup: 20
  warmdown_steps: 1200
  clip: 0.0
  bf16: true
  grad_ckpt: false
  batch_tokens: 524288
  max_tokens: 10485760000
  seed: 0
  optimizer:
    name: muon
    muon_momentum: 0.95
    muon_ns_steps: 5
    muon_momentum_warmup_start: 0.85
    muon_momentum_warmup_steps: 500
    gradient_transform:
      mode: identity
    update_filter:
      mode: none

data:
  tokenizer: parameter-golf
  seq_len: 1024
  batch_size: 8
  workers: 0
  eval_tokens: 524288
  shards:
    - name: parameter-golf
      split: train
      weight: 1.0

parameter_golf:
  train_shards_glob: runs/parameter_golf/fineweb10b_sp1024/train_*.bin
  val_shards_glob: runs/parameter_golf/fineweb10b_sp1024/val_*.bin
  tokenizer_path: runs/parameter_golf/tokenizers/sp1024.model
  artifact_budget_bytes: 16000000
  code_bytes: 50000
  track: 10min
  max_wallclock_seconds: 600
  val_batch_tokens: 524288
  val_loss_every: 200
  train_log_every: 50

evolution:
  population: 12
  rung1_tokens: 16777216
  rung2_tokens: 67108864
  crossover_prob: 0.0
  parent_selection: map_elites
  weight_inheritance: scratch
  mutation_allowlist:
    - tune_parameter_group_lrs
    - tune_muon_momentum_warmup
    - tune_warmup
    - tune_warmdown
    - tune_clip
  objectives:
    val_bpb: min
    artifact_total_bytes: min
    throughput: max
    main_track_eligible_exact: max
  rung0_thresholds:
    max_params: 28000000
    max_artifact_total_bytes_est: 24000000
    max_artifact_total_bytes: 16000000
    max_official_submission_requires_patch: 0
    max_official_submission_code_over_budget_bytes_est: 0
