  packed_dtype: uint16
  seq_len: 1024
  batch_size: 1
  workers: 0
  shards: []
  eval_tokens: 65536
  healing_shards: []
  healing_tokens: null
evolution:
  rung0_thresholds:
    gate_entropy_min: 0.0
    gate_entropy_max: 4.0
    min_layers: 8.0
    min_moe_blocks: 2.0
    min_selector_blocks: 1.0
    min_memory_blocks: 2.0
    min_recurrences: 1.0
  gate_schedule:
  - generation: 0
    thresholds:
      min_layers: 8.0
      min_moe_blocks: 2.0
      min_selector_blocks: 1.0
      min_memory_blocks: 2.0
      min_recurrences: 1.0
  - generation: 8
    thresholds:
      min_layers: 10.0
      min_moe_blocks: 2.0
      min_selector_blocks: 2.0
      min_memory_blocks: 3.0
      min_recurrences: 2.0
  - generation: 16
    thresholds:
      min_layers: 12.0
      min_moe_blocks: 3.0
      min_selector_blocks: 2.0
      min_memory_blocks: 4.0
      min_recurrences: 2.0
  rung1_tokens: 180000
  rung2_tokens: 540000
  population: 16
  topk_keep: 0.6
  crossover_prob: 0.45
  parent_selection: map_elites
  archive_max_elites: 64
  map_elites_complexity_band: true
  complexity_band_width: 3.0
  adaptive_mutation: true
  adaptive_mutation_eta: 0.1
  adaptive_mutation_min_weight: 0.05
  adaptive_mutation_max_weight: 5.0
  weight_inheritance: parent
  register_template_entries: true
  novelty_archive_k: 15
  novelty_archive_max: 500
  pareto_objectives:
  - ppl_code
  - passkey_loss
  - long_recall
  - recurrence_gain
  - memory_blocks
  - recurrences
  - throughput
  - novelty
  - graph_entropy
  objectives:
    ppl_code: min
    passkey_loss: min
    long_recall: max
    recurrence_gain: max
    memory_blocks: max
    recurrences: max
    throughput: max
    novelty: max
    graph_entropy: max
    instability: min
  composite_metrics:
  - name: ppl_per_long_recall
    op: ratio
    numerator: ppl_code
    denominator: long_recall
    terms: {}
    epsilon: 0.1
  promotion_prob: 0.5
  promotion_min_layers: 10
  promotion_min_moe_blocks: 3
  promotion_steps_multiplier: 1.5
  promotion_tokens_multiplier: 1.5
  promotion_min_router_entropy: 0.0
  promotion_min_recurrence_gain: 0.0
  promotion_max_instability: null
  structural_elite_k: 4
  structural_elite_weights:
    layers: 1.0
    moe_blocks: 3.0
    selector_blocks: 2.0
  template_learning: true
  template_learning_eta: 0.2
  template_learning_min_weight: 0.05
  template_learning_max_weight: 5.0
  template_learning_max_templates: 128
  template_learning_save_every: 20
  template_learning_save_path: runs/template_learning/exp_titan_like_memory_modal_v1_templates.json
  template_learning_promote_min_delta: 0.0
priors:
  tokens_per_param: 4.0
  window_scale: 6.0
  rope_theta_default: 10000.0
  prior_weight: 0.0
  compute_penalty_weight: 0.0
