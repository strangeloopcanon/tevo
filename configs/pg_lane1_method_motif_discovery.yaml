model:
  name: pg-lane1-method-motif-discovery
  emb:
    dim: 512
    vocab: 1024
  blocks:
    - &lane1_block
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 4
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 1024
        activation: swiglu
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
    - *lane1_block
  head:
    vocab: 1024
    tie_embeddings: true

train:
  lr: 0.001
  warmup: 32
  clip: 1.0
  bf16: true
  grad_ckpt: false
  max_tokens: 524288
  seed: 0
  optimizer:
    name: muon
    gradient_transform:
      mode: orthogonalize_2d
      ns_steps: 5
      eps: 1.0e-8
    update_filter:
      mode: bernoulli
      keep_ratio: 0.65

data:
  tokenizer: parameter-golf
  seq_len: 512
  batch_size: 8
  workers: 0
  eval_tokens: 8192
  shards:
    - name: parameter-golf
      split: train
      weight: 1.0

parameter_golf:
  train_shards_glob: runs/parameter_golf/fineweb10b_sp1024/train_*.bin
  val_shards_glob: runs/parameter_golf/fineweb10b_sp1024/val_*.bin
  tokenizer_path: runs/parameter_golf/tokenizers/sp1024.model
  artifact_budget_bytes: 16000000
  code_bytes: 50000
  track: 10min

evolution:
  population: 12
  mutation_steps: 1
  rung1_tokens: 262144
  rung2_tokens: 524288
  crossover_prob: 0.0
  parent_selection: map_elites
  weight_inheritance: scratch
  template_learning: true
  template_learning_eta: 0.25
  template_learning_max_templates: 64
  template_learning_save_every: 1
  template_learning_save_path: runs/parameter_golf_motif_templates/pg_lane1_method_motifs.yaml
  template_learning_seed_path: configs/pg_method_motif_templates.yaml
  mutation_allowlist:
    - template_mutation
    - mix_optimizer_recipe
    - mix_method_recipe
    - resample_optimizer_base
    - tune_optimizer
    - toggle_gradient_transform_mode
    - tune_gradient_transform_ns_steps
    - tune_gradient_transform_eps
    - toggle_update_filter_mode
    - tune_update_filter_ratio
    - tune_update_filter_granularity
    - tune_update_filter_momentum_blend
    - tune_update_filter_block_size
    - tune_warmup
    - tune_clip
    - tune_softmax_policy
  mutation_weights:
    template_mutation: 4.0
    mix_optimizer_recipe: 1.2
    mix_method_recipe: 1.2
    resample_optimizer_base: 0.8
    tune_optimizer: 1.0
    toggle_gradient_transform_mode: 1.0
    tune_gradient_transform_ns_steps: 1.1
    tune_gradient_transform_eps: 0.8
    toggle_update_filter_mode: 1.0
    tune_update_filter_ratio: 1.1
    tune_update_filter_granularity: 1.2
    tune_update_filter_momentum_blend: 1.2
    tune_update_filter_block_size: 1.2
    tune_warmup: 1.0
    tune_clip: 0.8
    tune_softmax_policy: 1.1
  objectives:
    val_bpb: min
    artifact_total_bytes: min
    quantization_delta_bpb: min
    throughput: max
  rung0_thresholds:
    max_params: 28000000
    max_artifact_total_bytes_est: 24000000
    max_artifact_total_bytes: 16000000
  gate_schedule:
    - generation: 16
      thresholds:
        max_artifact_total_bytes_est: 23000000
        max_artifact_total_bytes: 16000000
    - generation: 32
      thresholds:
        max_artifact_total_bytes_est: 22000000
        max_artifact_total_bytes: 16000000
