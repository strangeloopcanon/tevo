train:
  lr: 0.0003
  warmup: 2000
  clip: 1.0
  bf16: true
  grad_ckpt: true
  max_tokens: 1800000
  weight_decay: 0.2
  seed: 0
  passkey_eval_steps: 0
  speedrun_eval_interval: 8
  speedrun_eval_batches: 8
  ppl_stop_threshold: null
  entropy_threshold: 0.5
  entropy_patience: 3
  instability_threshold: 500.0
  no_improve_patience: 60
  improvement_tolerance: 0.001
  optimizer:
    name: adamw
    lr: 0.0003
    betas:
    - 0.8
    - 0.95
    eps: 1.0e-08
    weight_decay: 0.2
  speedrun_target_ppl: 2000.0
data:
  tokenizer: gpt2
  hf_revision: main
  streaming: false
  packed: true
  packed_train_path: runs/packed/fineweb_edu_10m/train.bin
  packed_val_path: runs/packed/fineweb_edu_10m/val.bin
  packed_dtype: uint16
  seq_len: 2048
  batch_size: 2
  workers: 0
  shards: []
  eval_tokens: 131072
  healing_shards: []
  healing_tokens: null
evolution:
  rung0_thresholds:
    max_params: 700000000
    max_kv_bytes_per_token: 220000
    min_layers: 16
    min_throughput_proxy: 0.9
    max_stop_reason_code: 1
  rung1_tokens: 500000
  rung2_tokens: 1800000
  population: 28
  topk_keep: 0.45
  crossover_prob: 0.45
  parent_selection: map_elites
  archive_max_elites: 64
  structural_elite_k: 4
  adaptive_mutation: true
  adaptive_mutation_eta: 0.1
  adaptive_mutation_min_weight: 0.05
  adaptive_mutation_max_weight: 5.0
  adaptive_rung_budget: true
  adaptive_rung_fast_promote_threshold: 0.12
  adaptive_rung_slow_stop_threshold: 0.015
  promotion_prob: 0.35
  promotion_min_layers: 18
  promotion_min_moe_blocks: 0
  promotion_steps_multiplier: 1.5
  promotion_tokens_multiplier: 1.5
  promotion_min_router_entropy: 0.0
  promotion_min_recurrence_gain: 0.0
  promotion_max_instability: 50.0
  weight_inheritance: scratch
  objectives:
    speedrun_loss_auc: min
    speedrun_end_eval_loss: min
    efficiency_score_scaled: min
  composite_metrics:
  - name: efficiency_score
    op: ratio
    numerator: speedrun_loss_auc
    denominator: throughput
    epsilon: 1.0e-06
  - name: efficiency_score_scaled
    op: weighted_sum
    terms:
      efficiency_score: 10000.0
