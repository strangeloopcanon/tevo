model:
  name: pg-lane2-shared-depth
  emb:
    dim: 512
    vocab: 1024
  blocks:
    - &shared_block_a
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 4
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 1536
        activation: swiglu
    - &shared_block_b
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 4
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 2048
        activation: gelu
    - &shared_block_c
      attn:
        kind: MQA
        heads: 8
        head_dim: 64
        softmax:
          qk_norm: rms
          softcap: 12.0
      ffn:
        type: dense
        hidden: 1536
        activation: swiglu
    - &shared_block_d
      attn:
        kind: MLA
        heads: 8
        head_dim: 64
        kv_latent_dim: 128
        value_glu: true
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 1792
        activation: swiglu
    - &shared_block_e
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 2
        softmax:
          qk_norm: rms
          softcap: 16.0
      ffn:
        type: dense
        hidden: 2048
        activation: swiglu
    - &shared_block_f
      attn:
        kind: GQA
        heads: 8
        head_dim: 64
        kv_groups: 4
        softmax:
          qk_norm: rms
          softcap: 12.0
      ffn:
        type: dense
        hidden: 1536
        activation: swiglu
    - <<: *shared_block_a
      share_with: 0
    - <<: *shared_block_b
      share_with: 1
    - <<: *shared_block_c
      share_with: 2
    - <<: *shared_block_d
      share_with: 3
    - <<: *shared_block_e
      share_with: 4
    - <<: *shared_block_f
      share_with: 5
  recurrences:
    - start: 6
      end: 12
      adapter: gated
      concat_prelude: true
      train_recurrence: 1
      max_train_recurrence: 3
      test_recurrences: [1, 2, 4]
  head:
    vocab: 1024
    tie_embeddings: true

train:
  lr: 0.001
  warmup: 32
  clip: 1.0
  bf16: true
  grad_ckpt: false
  max_tokens: 524288
  seed: 0
  optimizer:
    name: muon
    gradient_transform:
      mode: orthogonalize_2d
      ns_steps: 5
      eps: 1.0e-8
    update_filter:
      mode: bernoulli
      keep_ratio: 0.75

data:
  tokenizer: parameter-golf
  seq_len: 512
  batch_size: 8
  workers: 0
  eval_tokens: 8192
  shards:
    - name: parameter-golf
      split: train
      weight: 1.0

parameter_golf:
  train_shards_glob: runs/parameter_golf/fineweb10b_sp1024/train_*.bin
  val_shards_glob: runs/parameter_golf/fineweb10b_sp1024/val_*.bin
  tokenizer_path: runs/parameter_golf/tokenizers/sp1024.model
  artifact_budget_bytes: 16000000
  code_bytes: 50000
  track: 10min

evolution:
  population: 16
  rung1_tokens: 262144
  rung2_tokens: 524288
  crossover_prob: 0.0
  parent_selection: map_elites
  weight_inheritance: scratch
  mutation_allowlist:
    - share_block_with_previous
    - unshare_block
    - add_recurrence
    - tune_recurrence
    - toggle_mla_attention
    - make_gqa
    - tune_attn_shape
    - tune_softmax_policy
    - mix_optimizer_recipe
    - tune_optimizer
    - mix_method_recipe
    - tune_ffn_width_activation
  objectives:
    val_bpb: min
    artifact_total_bytes: min
    quantization_delta_bpb: min
    throughput: max
  rung0_thresholds:
    max_params: 28000000
    max_physical_depth: 6
    max_artifact_total_bytes_est: 21000000
    max_artifact_total_bytes: 16000000
  gate_schedule:
    - generation: 24
      thresholds:
        max_artifact_total_bytes_est: 19000000
        max_artifact_total_bytes: 16000000
    - generation: 48
      thresholds:
        max_artifact_total_bytes_est: 18000000
        max_artifact_total_bytes: 16000000
